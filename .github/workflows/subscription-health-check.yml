name: Twitch Subscription Health Check

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  health-check:
    name: Check Twitch Subscription Health
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Delete Steam package.json
        run: rm -f packages/steam/package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared-utils
        # The health check runs twitch-events from source; @dotabod/shared-utils
        # is its only workspace dependency resolved from dist. Building everything
        # would pull in the steam package, whose package.json this workflow deletes.
        run: pnpm --filter @dotabod/shared-utils run build

      - name: Run Health Check
        working-directory: ./packages/twitch-events
        env:
          # Add all required environment variables from your Doppler secrets
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_BOT_PROVIDERID: ${{ secrets.TWITCH_BOT_PROVIDERID }}
          DB_SECRET: ${{ secrets.DB_SECRET }}
          DB_URL: ${{ secrets.DB_URL }}
          # Add any other required environment variables
        run: pnpm run subscription-health-check

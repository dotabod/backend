name: Update dotaconstants (low-noise)

on:
  workflow_dispatch:
  schedule:
    # Weekly check to avoid noisy update churn.
    - cron: '30 6 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dotaconstants-update
  cancel-in-progress: true

jobs:
  update-dotaconstants:
    runs-on: ubuntu-latest
    # `prod` environment scopes the GHA_PAT secret used to create the PR.
    environment: prod
    env:
      UPDATE_BRANCH: ci/update-dotaconstants
      BASE_BRANCH: master
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Detect patch-relevant changes
        id: scan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python .github/scripts/update_dotaconstants.py

      - name: Setup pnpm
        if: steps.scan.outputs.should_update == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2

      - name: Setup Node
        if: steps.scan.outputs.should_update == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # Pin to the exact detected SHA (not the floating branch ref) so the bump
      # is deterministic regardless of pnpm's git-ref cache. This updates both
      # packages/dota/package.json and pnpm-lock.yaml (correct tarball integrity)
      # in one shot, keeping the manifest and lockfile in sync.
      - name: Bump dotaconstants to latest SHA
        if: steps.scan.outputs.should_update == 'true'
        run: |
          pnpm --filter @dotabod/dota update \
            "dotaconstants@github:dotabod/dotaconstants#${{ steps.scan.outputs.latest_sha }}" \
            --lockfile-only

      - name: Create Pull Request
        if: steps.scan.outputs.should_update == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          # PAT (not GITHUB_TOKEN) so the created PR triggers the CI + Autofix
          # workflows — pushes/PRs made with GITHUB_TOKEN don't fire workflows.
          token: ${{ secrets.GHA_PAT }}
          title: 'chore(dota): update dotaconstants for patch-relevant changes'
          body: |
            Automated dotaconstants refresh.

            This PR is created only when patch-relevant datasets changed in `dotabod/dotaconstants`:
            - `build/heroes.json`
            - `build/items.json`
            - `build/item_ids.json`
            - `build/abilities.json`
            - `build/hero_abilities.json`
            - `build/aghs_desc.json`

            Updated:
            - `packages/dota/package.json`
            - `pnpm-lock.yaml`

            Comparison:
            - Previous SHA: `${{ steps.scan.outputs.current_sha }}`
            - Latest SHA: `${{ steps.scan.outputs.latest_sha }}`
            - Changed relevant files: `${{ steps.scan.outputs.changed_files }}`
          base: ${{ env.BASE_BRANCH }}
          branch: ${{ env.UPDATE_BRANCH }}
          commit-message: 'chore(dota): refresh dotaconstants pin'
          delete-branch: true
          add-paths: |
            packages/dota/package.json
            pnpm-lock.yaml

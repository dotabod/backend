name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - 'packages/dota/**'           # Dota service and related changes
      - 'packages/twitch-chat/**'    # Twitch Chat service changes
      - 'packages/steam/**'          # Steam service changes
      - 'packages/twitch-events/**'  # Twitch Events service changes
      - 'packages/shared-utils/**'   # Shared utilities used by multiple services
      - 'packages/profanity-filter/**'
      - 'package.json'
      - 'bun.lock'
      - 'packages/Dockerfile.bun'    # Shared Dockerfile for bun-based services
      - 'docker-compose.yml'         # Compose file changes might affect all services
      - '.github/workflows/builder.yml' # The build workflow itself (affects all images)

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dota
            paths: '^packages/(dota|profanity-filter|shared-utils)/|^packages/Dockerfile\.bun|^docker-compose\.yml|^package\.json|^bun\.lock|^\.github/workflows/builder\.yml'
          - service: twitch-chat
            paths: '^packages/(twitch-chat|shared-utils)/|^packages/Dockerfile\.bun|^docker-compose\.yml|^\.github/workflows/builder\.yml'
          - service: steam
            paths: '^packages/(steam|shared-utils)/|^packages/Dockerfile\.bun|^docker-compose\.yml|^\.github/workflows/builder\.yml'
          - service: twitch-events
            paths: '^packages/(twitch-events|shared-utils)/|^packages/Dockerfile\.bun|^docker-compose\.yml|^\.github/workflows/builder\.yml'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only HEAD^ HEAD | grep -qE "${{ matrix.paths }}"; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract branch name
        if: steps.changes.outputs.should_build == 'true'
        shell: bash
        run: |
          echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"
          # Sanitize branch name for Docker tag (replace '/' with '-')
          echo "DOCKER_TAG=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> "$GITHUB_ENV"
          # Immutable per-commit tag + OCI label metadata
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      - name: Login to ghcr
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHA_PAT }}

      - name: Build and push
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/bake-action@v7
        with:
          push: true
          provenance: false
          targets: ${{ matrix.service }}
          set: |
            *.platform=linux/arm64
            ${{ matrix.service }}.tags=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ env.DOCKER_TAG }}
            ${{ matrix.service }}.tags+=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:sha-${{ env.GIT_SHA }}
            *.labels.org.opencontainers.image.revision=${{ github.sha }}
            *.labels.org.opencontainers.image.created=${{ env.BUILD_DATE }}
            *.labels.org.opencontainers.image.version=${{ env.DOCKER_TAG }}
            *.cache-from=
            *.cache-to=

name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

concurrency:
  group: builder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.select.outputs.services }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Single source of truth for the build dependency graph. paths-filter
      # diffs the full push range (github.event.before..after), so multi-commit
      # pushes can't skip a rebuild. package.json/pnpm-lock.yaml are listed for every
      # service since they all share the root lockfile + pnpm install.
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            dota:
              - 'packages/dota/**'
              - 'packages/profanity-filter/**'
              - 'packages/shared-utils/**'
              - 'packages/Dockerfile'
              - 'docker-compose.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/builder.yml'
            twitch-chat:
              - 'packages/twitch-chat/**'
              - 'packages/shared-utils/**'
              - 'packages/Dockerfile'
              - 'docker-compose.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/builder.yml'
            steam:
              - 'packages/steam/**'
              - 'packages/shared-utils/**'
              - 'packages/Dockerfile'
              - 'docker-compose.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/builder.yml'
            twitch-events:
              - 'packages/twitch-events/**'
              - 'packages/shared-utils/**'
              - 'packages/Dockerfile'
              - 'docker-compose.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/builder.yml'

      - name: Select services to build
        id: select
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'services=["dota","twitch-chat","steam","twitch-events"]' >> "$GITHUB_OUTPUT"
          else
            echo 'services=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.services != '[]'
    # Native arm64 runner (free on public repos) — avoids the ~5-10x QEMU
    # emulation overhead from building linux/arm64 on ubuntu-latest (amd64).
    runs-on: ubuntu-24.04-arm
    environment: prod
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract branch name
        shell: bash
        run: |
          echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"
          # Sanitize branch name for Docker tag (replace '/' with '-')
          echo "DOCKER_TAG=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> "$GITHUB_ENV"
          # Immutable per-commit tag + OCI label metadata
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      - name: Login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHA_PAT }}

      # cache-to mode=min only exports the final-stage layers (vs mode=max
      # exporting every intermediate step). Saves ~25-30s of cache upload per
      # build; tradeoff is that intermediate stages re-run on cache miss — but
      # those steps total ~10s, so we come out ahead.
      - name: Build and push
        uses: docker/bake-action@v7
        with:
          push: true
          provenance: false
          targets: ${{ matrix.service }}
          set: |
            *.platform=linux/arm64
            *.args.COMMIT_HASH=${{ env.GIT_SHA }}
            ${{ matrix.service }}.tags=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ env.DOCKER_TAG }}
            ${{ matrix.service }}.tags+=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:sha-${{ env.GIT_SHA }}
            *.labels.org.opencontainers.image.revision=${{ github.sha }}
            *.labels.org.opencontainers.image.created=${{ env.BUILD_DATE }}
            *.labels.org.opencontainers.image.version=${{ env.DOCKER_TAG }}
            *.cache-from=type=gha,scope=${{ matrix.service }}
            *.cache-to=type=gha,mode=min,scope=${{ matrix.service }}
